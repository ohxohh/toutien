<!DOCTYPE html>

<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>賴清德，我是不會屈服的！</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body { background-color: #f5f2ec; font-family: sans-serif; color: #3b3a36; }

.high-bp { font-weight: bold; color: #c75c4c; }  

.morning { color: #d38b3b; font-weight: bold; }  

.evening { color: #3b4f6b; font-weight: bold; }  

.migraine { color: #5c3a5d; font-weight: bold; } 

.delete-btn { cursor:pointer; color:#c75c4c; font-size:10px; text-center; }

</style>

</head>

<body class="p-4">



<div class="max-w-md mx-auto bg-[#ede6dc] rounded-3xl shadow-xl border border-[#cfc4b2]">



  <div class="bg-[#a79d8f] p-6 text-white text-center">

    <h1 class="text-2xl font-black italic">賴清德，我是不會屈服的！</h1>

    <p class="text-xs mt-2 font-medium">透天最高健康寶寶</p>

  </div>



  <!-- 輸入區 -->

  <div class="p-4 bg-[#f0ede7] border-b">

    <div class="flex gap-2 mb-2">

      <select id="t" class="w-1/3 p-2 rounded-xl border-2 border-[#cfc4b2] bg-white text-sm font-bold focus:border-[#a79d8f] outline-none">

        <option>早上</option>

        <option>晚上</option>

        <option>偏頭痛</option>

      </select>

      <input type="number" id="w" step="0.1" placeholder="體重 kg" class="w-2/3 p-2 rounded-xl border-2 border-[#cfc4b2] focus:border-[#a79d8f] outline-none text-sm">

    </div>

    <div class="flex gap-2 mb-2">

      <input type="number" id="s" placeholder="高壓(收縮)" class="w-1/2 p-2 rounded-xl border-2 border-[#cfc4b2] focus:border-[#a79d8f] outline-none text-sm">

      <input type="number" id="d" placeholder="低壓(舒張)" class="w-1/2 p-2 rounded-xl border-2 border-[#cfc4b2] focus:border-[#a79d8f] outline-none text-sm">

    </div>

    <input type="text" id="n" placeholder="備註 (如：吹風、閃光、已服藥)" class="w-full p-2 rounded-xl border-2 border-[#cfc4b2] focus:border-[#a79d8f] outline-none text-sm mb-2">

    <button onclick="save()" class="w-full bg-[#8b7765] hover:bg-[#7a6a57] text-white font-black py-3 rounded-2xl shadow-lg active:scale-95 transition-all">

      紀錄數據

    </button>

  </div>



  <!-- 圖表區 -->

  <div class="p-4">

    <canvas id="weightChart" height="150" class="mb-4"></canvas>

    <canvas id="bpChart" height="150"></canvas>

  </div>



  <!-- 紀錄列表 -->

  <div class="p-4 space-y-2" id="list"></div>



</div>



<script>

function save() {

    const s = parseInt(document.getElementById('s').value),

          d = parseInt(document.getElementById('d').value),

          w = document.getElementById('w').value,

          t = document.getElementById('t').value,

          n = document.getElementById('n').value;



    if(!s || !d || !w) return alert('數據填完整才行！');



    const dateStr = (new Date().getMonth()+1)+'/'+new Date().getDate();

    let logs = JSON.parse(localStorage.getItem('p_battle_final') || '[]');

    if(logs.find(l => l.date===dateStr && l.t===t)) return alert('今天這個時段已紀錄過囉！');



    const entry = { date: dateStr, t, w, s, d, n, ts: new Date().getTime() };

    logs.unshift(entry);

    localStorage.setItem('p_battle_final', JSON.stringify(logs));



    document.getElementById('s').value='';

    document.getElementById('d').value='';

    document.getElementById('w').value='';

    document.getElementById('n').value='';

    render();

}



function render() {

    const logs = JSON.parse(localStorage.getItem('p_battle_final') || '[]');

    const container = document.getElementById('list');

    const groups = {};

    logs.forEach(l => {

        if(!groups[l.date]) groups[l.date] = [];

        groups[l.date].push(l);

    });



    container.innerHTML = Object.keys(groups).map(date=>`

        <div class="border-2 border-[#cfc4b2] rounded-3xl overflow-hidden shadow-sm bg-[#f0ede7]">

            <div class="bg-[#e2ddcf] px-3 py-1 font-black text-gray-600 text-xs tracking-widest border-b">

                📅 日期：${date}

            </div>

            <div class="divide-y divide-[#cfc4b2]">

                ${groups[date].sort((a,b)=>a.ts-b.ts).map(l=>`

                    <div class="p-2 grid grid-cols-12 items-center gap-1">

                        <div class="col-span-3 text-sm ${l.t==='早上'?'morning':l.t==='晚上'?'evening':'migraine'}">${l.t}</div>

                        <div class="col-span-3 text-sm font-medium text-gray-700">${l.w}kg</div>

                        <div class="col-span-3 text-sm ${l.s >= 115 || l.d >= 90 ? 'high-bp' : 'text-gray-700'}">${l.s}/${l.d}</div>

                        <div class="col-span-2 text-sm text-gray-400 italic">${l.n||''}</div>

                        <div class="col-span-1 flex justify-center items-center">

                          <span class="delete-btn" onclick="deleteEntry(${l.ts})">刪除</span>

                        </div>

                    </div>

                `).join('')}

            </div>

        </div>

    `).join('');



    drawCharts(logs);

}



function deleteEntry(ts){

    if(!confirm('你確定要刪除此筆紀錄嗎？請 double check！')) return;

    let logs = JSON.parse(localStorage.getItem('p_battle_final') || '[]');

    logs = logs.filter(l=>l.ts!==ts);

    localStorage.setItem('p_battle_final', JSON.stringify(logs));

    render();

}



// Chart.js 繪圖

let weightChart, bpChart;

function drawCharts(logs){

    const dates = logs.map(l => l.date).reverse();

    const weightData = logs.map(l => parseFloat(l.w)).reverse();

    const sData = logs.map(l => l.s).reverse();

    const dData = logs.map(l => l.d).reverse();



    const weightCtx = document.getElementById('weightChart').getContext('2d');

    const bpCtx = document.getElementById('bpChart').getContext('2d');



    if(weightChart) weightChart.destroy();

    if(bpChart) bpChart.destroy();



    weightChart = new Chart(weightCtx, {

        type:'line',

        data:{ labels: dates, datasets:[{label:'體重(kg)', data:weightData, borderColor:'#7a6a57', backgroundColor:'#7a6a5733', fill:true, tension:0.3}] },

        options:{ scales:{y:{beginAtZero:false}} }

    });



    bpChart = new Chart(bpCtx, {

        type:'line',

        data:{

            labels: dates,

            datasets:[

                {label:'收縮壓', data:sData, borderColor:'#3b4f6b', backgroundColor:'#3b4f6b33', tension:0.3},

                {label:'舒張壓', data:dData, borderColor:'#d38b3b', backgroundColor:'#d38b3b33', tension:0.3}

            ]

        },

        options:{ scales:{y:{beginAtZero:false}} }

    });

}



render();

</script>

</body>

</html>
